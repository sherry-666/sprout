<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sprout — Quick Log + AI · prototype</title>
<meta name="viewport" content="width=1180, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; background: #ede9dc; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #1d2a22;
    min-height: 100vh;
  }
  * { box-sizing: border-box; }

  .stage { padding: 56px 48px 80px; }
  .stage-head { max-width: 880px; margin: 0 auto 40px; }
  .stage-head h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.5px; margin: 0 0 6px; }
  .stage-head p { font-size: 15px; color: rgba(60,60,67,0.65); margin: 0; max-width: 680px; line-height: 1.5; }

  .single-row {
    display: flex; gap: 56px; align-items: flex-start; justify-content: center;
    max-width: 1100px; margin: 0 auto;
  }
  .hint-card {
    background: white; border-radius: 18px; padding: 24px 26px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 12px 36px -20px rgba(20,40,30,0.15);
    width: 320px; flex: 0 0 auto;
    margin-top: 80px;
  }
  .hint-card-title {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase;
    color: rgba(60,60,67,0.55); margin-bottom: 12px;
  }
  .hint-card ol, .hint-card ul {
    margin: 0 0 4px; padding-left: 20px;
    font-size: 14px; line-height: 1.6; color: #1d2a22;
  }
  .hint-card ol li, .hint-card ul li { margin-bottom: 4px; }
  .hint-card strong { font-weight: 600; }
  .hint-card-divider { height: 1px; background: rgba(0,0,0,0.06); margin: 18px 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="proto-shared.jsx"></script>
<script type="text/babel" src="proto-ai-chat.jsx"></script>
<script type="text/babel" src="proto-var-a.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "sprout"
}/*EDITMODE-END*/;

const PHONE_W = 420;
const PHONE_H = 880;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = SproutColors[t.accent] || SproutColors.sprout;

  return (
    <AccentContext.Provider value={accent}>
      <div className="stage">
        <div className="stage-head">
          <h1>Quick Log → AI conversation</h1>
          <p>
            Quick Log lives in a half-sheet on Home. When you hit <strong>Send to AI</strong>, you land in a
            new AI chat thread where photo matching, draft review, and sending all happen inline as the
            conversation unfolds. Drag a photo onto a kid to add it (photos can go to multiple kids);
            tap the eye to skip a kid; or include another kid from the class.
          </p>
        </div>

        <div className="single-row">
          <IOSDevice width={PHONE_W} height={PHONE_H}>
            <PhoneA />
          </IOSDevice>
          <div className="hint-card">
            <div className="hint-card-title">Try the full loop</div>
            <ol>
              <li>Tap <strong>Start</strong> on the Quick Log card.</li>
              <li>Hit <strong>Send to AI</strong> on the composer.</li>
              <li>Watch the AI chat open. After "Looking at your photos…", the matching card appears.</li>
              <li><strong>Drag any photo</strong> in the carousel onto a kid card to add it.</li>
              <li>Tap an assigned photo to remove it, or use the <strong>eye</strong> to skip a kid.</li>
              <li>Hit <strong>Confirm matches</strong>. AI writes per-kid drafts.</li>
              <li>Edit any draft, then <strong>Send to families</strong>.</li>
            </ol>
            <div className="hint-card-divider" />
            <div className="hint-card-title">Also try</div>
            <ul>
              <li>Tap a <strong>class card</strong> on Home to open its roster.</li>
              <li>Open AI tab during the job — see the active chat pinned.</li>
              <li>Swap accent in the <strong>Tweaks</strong> panel.</li>
            </ul>
          </div>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent color">
          <TweakRadio
            label="Brand"
            value={t.accent}
            options={[
              { value: "sprout", label: "Sprout" },
              { value: "terra",  label: "Terra"  },
              { value: "indigo", label: "Indigo" },
            ]}
            onChange={(v) => setTweak("accent", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </AccentContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
